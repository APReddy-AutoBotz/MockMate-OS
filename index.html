<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/pwa-192x192.svg" />
  <link rel="apple-touch-icon" href="/pwa-apple-180x180.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Build an ATS-friendly resume, practice spoken English, and prepare for interviews with calm, friendly guidance." />
  <meta name="theme-color" content="#002C4B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MockMate">
  <link rel="manifest" href="/manifest.json" />
  <title>MockMate - Resume, English & Interview Practice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-dark': '#001A2D',
            'brand-primary': '#FFBC03',
            'brand-accent': '#1B4F72',
            'brand-tint': '#A8C5DA',
            'ink': '#002C4B',
            'emerald-confidence': '#059669',
            'emerald-light': '#34d399',
            'brand-navy': '#001D33',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            heading: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['Geist Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

    body {
      background-color: #002C4B;
      color: #FFFFFF;
      margin: 0;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #FFBC03;
      border-radius: 10px;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="font-sans">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
