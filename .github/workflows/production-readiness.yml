name: MockMate Production Readiness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web-and-api-build:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: 1. Install root & workspace dependencies
        run: npm ci

      - name: 2. Shared typecheck
        run: npm run check:contracts

      - name: 3. Shared tests
        run: npm run shared:test

      - name: 4. Shared build
        run: npm run shared:build

      - name: 5. Frontend typecheck
        run: npm run typecheck

      - name: 6. Full migration verification
        run: npm run verify:supabase

      - name: 7. Frontend build
        run: npm run build

      - name: 8. Backend tests
        working-directory: backend
        run: npm test

      - name: 9. Backend build
        working-directory: backend
        run: npm run build

      - name: 10. Production smoke checks
        run: npm run smoke:production

      - name: 11. Dependency audit
        run: npm run audit:production

      - name: 12. Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: 13. Mobile typecheck
        run: npm run mobile:typecheck

      - name: 14. Mobile lint
        run: npm run mobile:lint

      - name: 15. Production config smoke check
        shell: bash
        run: |
          test -f vercel.json
          test -f supabase/migrations/001_initial_schema.sql
          test -f supabase/migrations/20260721_add_authoritative_session_fields.sql
          test -f public/manifest.json
          test -f mobile/eas.json
          grep -q '"/api/(.*)"' vercel.json
          grep -q '"/api/index"' vercel.json
          grep -q '"display": "standalone"' public/manifest.json
          grep -q '"package": "com.mockmate.app"' mobile/app.json
